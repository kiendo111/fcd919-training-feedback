name: Nightly data refresh

# Re-fetches the six feedback tabs, strips name columns, and commits the refreshed
# CSVs if anything changed. GitHub Pages redeploys automatically on that commit, so the
# published report picks up new responses each night. Runs on a schedule and can also be
# triggered by hand from the Actions tab ("Run workflow").

on:
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC == 01:00 Asia/Ho_Chi_Minh (GMT+7)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and sanitize
        run: python update_data.py

      - name: Commit refreshed data if changed
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "data: nightly refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes."
          fi
